<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cour Immo — Visite 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a96e;
      --dark: #0d0d14;
      --cream: #f5f0e8;
      --green: #2d5a27;
      --text: #f0ece4;
      --panel: rgba(13, 13, 20, 0.72);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
    }

    #scene { position: absolute; inset: 0; }

    canvas { display: block; width: 100%; height: 100%; }

    .header {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .header img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
    }

    .header-title {
      font-family: "Playfair Display", serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-subtitle {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(201, 169, 110, 0.5);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .toggle button,
    .controls button {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: "DM Sans", sans-serif;
    }

    .toggle button.active,
    .controls button.active,
    .toggle button:hover,
    .controls button:hover {
      background: var(--gold);
      color: var(--dark);
    }

    .info-panel {
      position: absolute;
      top: 80px;
      right: 20px;
      display: grid;
      gap: 10px;
      z-index: 10;
    }

    .info-card {
      padding: 10px 14px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid rgba(201, 169, 110, 0.5);
      backdrop-filter: blur(10px);
      min-width: 150px;
    }

    .info-card span {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .info-card strong {
      display: block;
      margin-top: 6px;
      font-family: "Playfair Display", serif;
      font-size: 18px;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(201, 169, 110, 0.7);
      backdrop-filter: blur(14px);
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hud {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(201, 169, 110, 0.5);
      backdrop-filter: blur(10px);
      font-size: 12px;
      z-index: 10;
      min-width: 240px;
      text-align: center;
      display: none;
    }

    .progress {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
      display: none;
      z-index: 10;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width 0.2s ease;
    }

    .popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13, 13, 20, 0.6);
      border: 1px solid rgba(201, 169, 110, 0.8);
      border-radius: 16px;
      padding: 16px 20px;
      min-width: 260px;
      z-index: 20;
      display: none;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .popup h3 {
      margin: 0 0 8px;
      font-family: "Playfair Display", serif;
      font-size: 20px;
    }

    .popup p {
      margin: 4px 0;
      font-size: 13px;
      color: rgba(240, 236, 228, 0.85);
    }

    .popup button {
      margin-top: 10px;
      border: none;
      background: var(--gold);
      color: var(--dark);
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
    }

    .loader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: #0a0a0f;
      z-index: 30;
      transition: opacity 0.6s ease;
    }

    .loader-bar {
      width: 220px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
      margin-top: 16px;
    }

    .loader-bar span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--gold);
      animation: load 2s ease forwards;
    }

    @keyframes load { to { width: 100%; } }

    .hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div style="text-align:center;">
      <div class="header-title">COUR IMMO</div>
      <div class="header-subtitle">Logements modernes ŕ Adidogomé</div>
      <div class="loader-bar"><span></span></div>
    </div>
  </div>

  <div id="scene"><canvas id="canvas"></canvas></div>

  <div class="header">
    <img src="/logo.png" alt="Cour Immo" />
    <div>
      <div class="header-title">COUR IMMO</div>
      <div class="header-subtitle">Logements modernes ŕ Adidogomé</div>
    </div>
  </div>

  <div class="toggle" id="lightToggle">
    <button data-mode="day" class="active">Jour</button>
    <button data-mode="night">?? Nuit</button>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="info-card">
      <span>Nb unités</span>
      <strong>10 studios</strong>
    </div>
    <div class="info-card">
      <span>Surface</span>
      <strong>Cour 10 x 14 m</strong>
    </div>
    <div class="info-card">
      <span>Disponibilité</span>
      <strong>Q4 2026</strong>
    </div>
  </div>

  <div class="controls" id="controls">
    <button data-view="aerial">Vue aérienne</button>
    <button data-view="facade">Vue façade</button>
    <button data-view="tour">Visite guidée</button>
    <button data-view="orbit" class="active">Orbite libre</button>
    <button data-action="pause" id="pauseBtn" style="display:none;">Pause</button>
    <button data-action="quit" id="quitBtn" style="display:none;">Quitter</button>
  </div>

  <div class="hud" id="hud">Entrée principale</div>
  <div class="progress" id="progress"><span id="tourProgress"></span></div>

  <div class="popup" id="popup">
    <h3 id="popupTitle">Studio Standard</h3>
    <p id="popupBody">25 000 FCFA</p>
    <button id="popupClose">Fermer</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);

    const target = new THREE.Vector3(0, 1, 0);
    let targetTheta = Math.PI / 4;
    let targetPhi = 1.1;
    let targetRadius = 20;
    let theta = targetTheta;
    let phi = targetPhi;
    let radius = targetRadius;
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let activeView = 'orbit';
    let lightMode = 'day';

    const materials = {
      wall: new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.85 }),
      roof: new THREE.MeshStandardMaterial({ color: 0x3a3a3d, roughness: 0.9 }),
      pavement: new THREE.MeshStandardMaterial({ color: 0xc8bfb0, roughness: 0.95 }),
      glass: new THREE.MeshStandardMaterial({ color: 0x7aaccc, roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.35 }),
      frame: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4 }),
      wood: new THREE.MeshStandardMaterial({ color: 0x8b5e3c, roughness: 0.6 }),
      lawn: new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 1.0 }),
      canopy: new THREE.MeshStandardMaterial({ color: 0x2d6b28, roughness: 1.0 }),
      column: new THREE.MeshStandardMaterial({ color: 0xe8e4d8, roughness: 0.7 }),
      trim: new THREE.MeshStandardMaterial({ color: 0xe8e4d8, roughness: 0.7 }),
      metal: new THREE.MeshStandardMaterial({ color: 0x7a7a7a, roughness: 0.3, metalness: 0.6 }),
      gold: new THREE.MeshStandardMaterial({ color: 0xc9a96e, roughness: 0.4, metalness: 0.8 })
    };

    const stringBulbMaterial = new THREE.MeshStandardMaterial({
      color: 0xc9a96e,
      roughness: 0.2,
      metalness: 0.8,
      emissive: new THREE.Color(0xffcc66),
      emissiveIntensity: 0.0,
    });

    const ambient = new THREE.AmbientLight(0xd0e8ff, 0.4);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfff8e8, 1.6);
    sun.position.set(15, 20, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    const lampLights = [];
    const stringLights = [];
    const hotspotMeshes = [];
    const hotspotData = [];

    function createHippedRoof(width, depth, height) {
      const hw = width / 2;
      const hd = depth / 2;
      const geometry = new THREE.BufferGeometry();
      const vertices = new Float32Array([
        -hw, 0, -hd,   hw, 0, -hd,   0, height, 0,
         hw, 0, -hd,   hw, 0,  hd,   0, height, 0,
         hw, 0,  hd,  -hw, 0,  hd,   0, height, 0,
        -hw, 0,  hd,  -hw, 0, -hd,   0, height, 0,
      ]);
      geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geometry.computeVertexNormals();
      return geometry;
    }

    function createWindow(x, y, z) {
      const frame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.75, 0.08), materials.frame);
      frame.position.set(x, y, z);
      const glass = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.6, 0.02), materials.glass);
      glass.position.set(x, y, z + 0.04);
      return [frame, glass];
    }

    function createHotspot(position, info) {
      const group = new THREE.Group();
      const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), materials.gold);
      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.04, 12, 24), materials.gold);
      ring.rotation.x = Math.PI / 2;
      group.add(sphere, ring);
      group.position.copy(position);
      scene.add(group);
      hotspotMeshes.push(group);
      hotspotData.push(info);
    }

    function buildUnit(x, z, side, labelIndex) {
      const mirror = side === 'back';
      const size = labelIndex === 1 || labelIndex === 6 ? [4.2, 1.3, 3.8] : [3.6, 1.3, 3.6];
      const [w, h, d] = size;
      const group = new THREE.Group();

      const base = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), materials.wall);
      base.position.y = h / 2;
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      const roof = new THREE.Mesh(createHippedRoof(w + 0.2, d + 0.2, 0.9), materials.roof);
      roof.position.y = h + 0.2;
      roof.castShadow = true;
      group.add(roof);

      const door = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.95, 0.06), materials.wood);
      door.position.set(0, 0.48, d / 2 + 0.03);
      group.add(door);

      const porch = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.2, 0.9), materials.trim);
      porch.position.set(0, 0.1, d / 2 + 0.38);
      porch.receiveShadow = true;
      group.add(porch);

      const column = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.9, 12), materials.column);
      column.position.set(0.55, 0.55, d / 2 + 0.38);
      column.castShadow = true;
      group.add(column);

      const lamp = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 0.08), materials.frame);
      lamp.position.set(-0.6, 0.75, d / 2 + 0.04);
      group.add(lamp);

      const lampLight = new THREE.PointLight(0xffcc66, 0.8, 3);
      lampLight.position.copy(lamp.position).add(new THREE.Vector3(0, 0.1, 0.15));
      lampLight.visible = false;
      lampLights.push(lampLight);
      group.add(lampLight);

      const windows = createWindow(-0.9, 0.65, d / 2 + 0.03);
      windows.forEach((mesh) => group.add(mesh));

      const ac = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.35, 0.35), materials.metal);
      ac.position.set(-w / 3, h - 0.1, -d / 3);
      ac.castShadow = true;
      group.add(ac);

      const plant = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 12), materials.canopy);
      plant.position.set(1.1, 0.2, d / 2 + 0.65);
      group.add(plant);

      if (mirror) {
        group.scale.z = -1;
      }

      group.position.set(x, 0, z);
      scene.add(group);

      createHotspot(
        new THREE.Vector3(x, 0.8, mirror ? z - 2.3 : z + 2.3),
        {
          title: `Studio Standard ${labelIndex}`,
          body: "25 000 FCFA — Surface 18 m˛ — Lit, frigo, ventilateur, douche interne",
        }
      );
    }

    function buildComplex() {
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(90, 90), materials.lawn);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const courtyard = new THREE.Mesh(new THREE.BoxGeometry(14, 0.15, 10), materials.pavement);
      courtyard.position.y = 0.08;
      courtyard.receiveShadow = true;
      scene.add(courtyard);

      for (let i = -6; i <= 6; i += 1.4) {
        for (let j = -4; j <= 4; j += 1.4) {
          const tile = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.03, 1.2), materials.pavement);
          tile.position.set(i, 0.16, j);
          tile.receiveShadow = true;
          scene.add(tile);
        }
      }

      const rowOffset = 4.6;
      const spacing = 3.6;
      for (let i = 0; i < 5; i++) {
        const x = -7.2 + i * spacing;
        buildUnit(x, rowOffset, 'front', i + 1);
        buildUnit(x, -rowOffset, 'back', i + 6);
      }

      const backBlock = new THREE.Mesh(new THREE.BoxGeometry(6, 1.6, 3.2), materials.wall);
      backBlock.position.set(0, 0.8, -7.5);
      backBlock.castShadow = true;
      backBlock.receiveShadow = true;
      scene.add(backBlock);

      const backRoof = new THREE.Mesh(createHippedRoof(6.2, 3.4, 1), materials.roof);
      backRoof.position.set(0, 1.8, -7.5);
      scene.add(backRoof);

      const waterTower = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 3, 16), materials.metal);
      waterTower.position.set(9, 1.5, -6.5);
      waterTower.castShadow = true;
      scene.add(waterTower);

      const waterTop = new THREE.Mesh(new THREE.SphereGeometry(1.1, 16, 16), materials.metal);
      waterTop.position.set(9, 3.4, -6.5);
      scene.add(waterTop);

      const wallMaterial = materials.wall;
      const wallFront = new THREE.Mesh(new THREE.BoxGeometry(16, 1.8, 0.3), wallMaterial);
      wallFront.position.set(0, 0.9, 7.5);
      scene.add(wallFront);

      const wallBack = wallFront.clone();
      wallBack.position.set(0, 0.9, -7.5);
      scene.add(wallBack);

      const wallRight = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.8, 16), wallMaterial);
      wallRight.position.set(7.5, 0.9, 0);
      scene.add(wallRight);

      const wallLeft = wallRight.clone();
      wallLeft.position.set(-7.5, 0.9, 0);
      scene.add(wallLeft);

      const gate = new THREE.Mesh(new THREE.BoxGeometry(3, 1.6, 0.2), materials.metal);
      gate.position.set(0, 0.8, 7.65);
      scene.add(gate);

      createHotspot(new THREE.Vector3(0, 1, 7.2), {
        title: "Entrée sécurisée",
        body: "Accčs 24h/24 — Portail métal sécurisé",
      });

      const kitchenSpot = new THREE.Vector3(0, 1.2, -7.5);
      createHotspot(kitchenSpot, {
        title: "Cuisine commune",
        body: "Label Cour Propre — équipements partagés",
      });

      for (let i = 0; i < 8; i++) {
        const shrub = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), materials.canopy);
        shrub.position.set(-7 + i * 2, 0.2, 6.6);
        scene.add(shrub);
        const shrub2 = shrub.clone();
        shrub2.position.z = -6.6;
        scene.add(shrub2);
      }

      const bananaTrees = [
        [-10, -10],
        [10, -10],
        [10, 10],
        [-10, 10],
      ];
      bananaTrees.forEach(([x, z]) => {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 3.5, 10), new THREE.MeshStandardMaterial({ color: 0x6b4a2f, roughness: 0.8 }));
        trunk.position.set(x, 1.7, z);
        trunk.castShadow = true;
        const canopy = new THREE.Mesh(new THREE.SphereGeometry(2.0, 16, 16), materials.canopy);
        canopy.position.set(x, 4, z);
        canopy.castShadow = true;
        scene.add(trunk, canopy);
      });

      for (let i = -7; i <= 7; i += 2) {
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), stringBulbMaterial);
        bulb.position.set(i, 3.2, 0);
        scene.add(bulb);
        const light = new THREE.PointLight(0xffcc66, 0.4, 4);
        light.position.set(i, 3.2, 0);
        light.visible = false;
        stringLights.push(light);
        scene.add(light);
      }
    }

    buildComplex();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const popup = document.getElementById('popup');
    const popupTitle = document.getElementById('popupTitle');
    const popupBody = document.getElementById('popupBody');

    function onClick(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(hotspotMeshes, true);
      if (intersects.length) {
        const index = hotspotMeshes.findIndex((mesh) => mesh === intersects[0].object.parent);
        const info = hotspotData[index];
        if (info) {
          popupTitle.textContent = info.title;
          popupBody.textContent = info.body;
          popup.style.display = 'block';
        }
      }
    }

    document.getElementById('popupClose').addEventListener('click', () => {
      popup.style.display = 'none';
    });

    canvas.addEventListener('click', onClick);

    const hud = document.getElementById('hud');
    const progress = document.getElementById('progress');
    const tourProgress = document.getElementById('tourProgress');
    const infoPanel = document.getElementById('infoPanel');
    let tourActive = false;
    let tourPaused = false;
    let tourTime = 0;
    let tourIndex = 0;

    const keyframes = [
      { pos: new THREE.Vector3(0, 1.7, 8), look: new THREE.Vector3(0, 1.3, 0), duration: 4, label: "Entrée principale" },
      { pos: new THREE.Vector3(0, 1.7, 2), look: new THREE.Vector3(0, 1.2, -4), duration: 4, label: "Cour centrale" },
      { pos: new THREE.Vector3(-4, 1.7, 0), look: new THREE.Vector3(-6, 1.2, 0), duration: 4, label: "Studios côté gauche" },
      { pos: new THREE.Vector3(4, 1.7, 0), look: new THREE.Vector3(6, 1.2, 0), duration: 4, label: "Studios côté droit" },
      { pos: new THREE.Vector3(0, 2.5, 0), look: new THREE.Vector3(0, 3.2, 0), duration: 3, label: "Éclairage suspendu" },
    ];

    function startTour() {
      tourActive = true;
      tourPaused = false;
      tourTime = 0;
      tourIndex = 0;
      activeView = 'tour';
      hud.style.display = 'block';
      progress.style.display = 'block';
      infoPanel.style.display = 'none';
      document.getElementById('pauseBtn').style.display = 'inline-block';
      document.getElementById('quitBtn').style.display = 'inline-block';
      updateHud();
    }

    function stopTour() {
      tourActive = false;
      tourPaused = false;
      hud.style.display = 'none';
      progress.style.display = 'none';
      infoPanel.style.display = 'grid';
      document.getElementById('pauseBtn').style.display = 'none';
      document.getElementById('quitBtn').style.display = 'none';
      setView('orbit');
    }

    function updateHud() {
      hud.textContent = keyframes[tourIndex]?.label || "Visite";
    }

    function setLightMode(mode) {
      lightMode = mode;
      if (mode === 'night') {
        sun.intensity = 0.02;
        ambient.intensity = 0.1;
        ambient.color.set(0x0a0f1a);
        scene.background.set(0x050810);
        scene.fog.color.set(0x050810);
        lampLights.forEach((light) => (light.visible = true));
        stringLights.forEach((light) => (light.visible = true));
        stringBulbMaterial.emissiveIntensity = 0.9;
      } else {
        sun.intensity = 1.6;
        ambient.intensity = 0.4;
        ambient.color.set(0xd0e8ff);
        scene.background.set(0x87ceeb);
        scene.fog.color.set(0x87ceeb);
        lampLights.forEach((light) => (light.visible = false));
        stringLights.forEach((light) => (light.visible = false));
        stringBulbMaterial.emissiveIntensity = 0.0;
      }
    }

    function setView(view) {
      activeView = view;
      if (view === 'aerial') {
        targetPhi = 0.05;
        targetRadius = 22;
      } else if (view === 'facade') {
        targetPhi = 1.3;
        targetRadius = 16;
        targetTheta = 0;
      } else if (view === 'orbit') {
        targetPhi = 1.1;
        targetRadius = 20;
      } else if (view === 'tour') {
        startTour();
      }
    }

    function updateTour(delta) {
      if (!tourActive || tourPaused) return;
      const current = keyframes[tourIndex];
      const next = keyframes[tourIndex + 1] || keyframes[0];
      tourTime += delta;
      const t = Math.min(tourTime / current.duration, 1);

      camera.position.lerpVectors(current.pos, next.pos, t);
      const look = new THREE.Vector3().lerpVectors(current.look, next.look, t);
      camera.lookAt(look);

      const totalDuration = keyframes.reduce((sum, k) => sum + k.duration, 0);
      const elapsed = keyframes.slice(0, tourIndex).reduce((sum, k) => sum + k.duration, 0) + tourTime;
      tourProgress.style.width = `${Math.min((elapsed / totalDuration) * 100, 100)}%`;

      if (t >= 1) {
        tourIndex += 1;
        if (tourIndex >= keyframes.length - 1) {
          tourIndex = 0;
          tourTime = 0;
        } else {
          tourTime = 0;
        }
        updateHud();
      }
    }

    function onPointerDown(event) {
      if (activeView !== 'orbit') return;
      isDragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
    }

    function onPointerMove(event) {
      if (!isDragging || activeView !== 'orbit') return;
      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      targetTheta -= dx * 0.005;
      targetPhi = Math.min(Math.PI / 2.05, Math.max(0.05, targetPhi + dy * 0.005));
    }

    function onPointerUp() { isDragging = false; }

    function onWheel(event) {
      if (activeView !== 'orbit') return;
      targetRadius = Math.min(30, Math.max(10, targetRadius + event.deltaY * 0.01));
    }

    canvas.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('wheel', onWheel);

    canvas.addEventListener('touchstart', (event) => {
      if (event.touches.length === 1) onPointerDown(event.touches[0]);
    });
    canvas.addEventListener('touchmove', (event) => {
      if (event.touches.length === 1) onPointerMove(event.touches[0]);
    });
    canvas.addEventListener('touchend', onPointerUp);

    document.getElementById('pauseBtn').addEventListener('click', () => {
      tourPaused = !tourPaused;
      document.getElementById('pauseBtn').textContent = tourPaused ? 'Reprendre' : 'Pause';
    });

    document.getElementById('quitBtn').addEventListener('click', stopTour);

    document.querySelectorAll('[data-view]').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('[data-view]').forEach((b) => b.classList.remove('active'));
        button.classList.add('active');
        setView(button.dataset.view);
      });
    });

    document.querySelectorAll('[data-mode]').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('[data-mode]').forEach((b) => b.classList.remove('active'));
        button.classList.add('active');
        setLightMode(button.dataset.mode);
      });
    });

    function animate(time) {
      requestAnimationFrame(animate);

      if (activeView === 'orbit') {
        theta += (targetTheta - theta) * 0.07;
        phi += (targetPhi - phi) * 0.07;
        radius += (targetRadius - radius) * 0.07;
        phi = Math.max(0.05, Math.min(Math.PI / 2.05, phi));
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const z = radius * Math.sin(phi) * Math.sin(theta);
        const y = radius * Math.cos(phi);
        camera.position.set(x, y, z);
        camera.lookAt(target);
      }

      updateTour(0.016);

      const pulse = 1 + Math.sin(time * 0.003) * 0.1;
      hotspotMeshes.forEach((mesh) => mesh.scale.setScalar(pulse));

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setLightMode('day');

    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 2000);

    animate(0);
  </script>
</body>
</html>
