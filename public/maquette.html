
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maquette 3D — Cour Immo | Adidogomé, Lomé</title>
  <link rel="icon" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <style>
    :root {
      --navy: #1a2d6b;
      --green: #4a9c2f;
      --gold: #c9a96e;
      --dark: #0d0d14;
      --cream: #f5f0e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      overflow: hidden;
      font-family: "DM Sans", sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a12;
      display: grid;
      place-items: center;
      z-index: 10;
      color: var(--gold);
      font-family: "Playfair Display", serif;
    }

    #loading .wrap {
      text-align: center;
      display: grid;
      gap: 10px;
    }

    #loading .bar {
      width: 240px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    #loading .bar span {
      display: block;
      height: 100%;
      width: 70%;
      background: linear-gradient(90deg, var(--navy), var(--green));
      animation: load 2s ease forwards;
    }

    @keyframes load { from { width: 0; } to { width: 100%; } }

    header {
      position: fixed;
      top: 18px;
      left: 22px;
      right: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
      pointer-events: none;
    }

    .brand {
      pointer-events: auto;
      font-family: "Playfair Display", serif;
      color: var(--cream);
      display: grid;
      gap: 4px;
    }
    .brand .logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .brand .title { font-size: 1.3rem; letter-spacing: 0.08em; }
    .brand .subtitle { font-size: 0.8rem; color: rgba(245,240,232,0.7); }

    .back-link {
      display: inline-block;
      margin-bottom: 6px;
      font-size: 0.75rem;
      color: rgba(245,240,232,0.7);
      text-decoration: none;
    }

    .toggle {
      pointer-events: auto;
      display: inline-flex;
      gap: 6px;
      background: rgba(13,13,20,0.6);
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .toggle button {
      background: transparent;
      border: none;
      color: var(--cream);
      cursor: pointer;
      font-family: "DM Sans", sans-serif;
    }

    .controls-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(201,169,110,0.25);
      background: rgba(10,10,20,0.75);
      backdrop-filter: blur(20px);
    }

    .controls-bar button {
      background: transparent;
      color: var(--cream);
      border: none;
      font-size: 0.85rem;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-family: "DM Sans", sans-serif;
    }

    .controls-bar button.active {
      background: rgba(74,156,47,0.25);
      color: var(--green);
    }

    .info-panel {
      position: fixed;
      right: 22px;
      top: 120px;
      display: grid;
      gap: 12px;
      z-index: 5;
    }

    .info-card {
      background: rgba(13,13,20,0.75);
      border: 1px solid rgba(201,169,110,0.25);
      border-top: 3px solid var(--gold);
      padding: 12px 16px;
      border-radius: 14px;
      min-width: 160px;
    }

    .info-card .value {
      font-family: "Playfair Display", serif;
      font-size: 1.1rem;
      color: var(--cream);
    }

    .info-card .label {
      font-size: 0.75rem;
      color: rgba(245,240,232,0.7);
    }

    #tour-hud {
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      z-index: 6;
      display: none;
      align-items: center;
      gap: 12px;
      flex-direction: column;
    }

    #tour-hud .location {
      background: rgba(13,13,20,0.75);
      border: 1px solid rgba(201,169,110,0.35);
      padding: 8px 14px;
      border-radius: 999px;
      font-family: "Playfair Display", serif;
    }

    #tour-hud .progress {
      width: 260px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    #tour-hud .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width 0.2s ease;
    }

    #tour-hud .actions {
      display: flex;
      gap: 10px;
    }

    #tour-hud button {
      background: rgba(13,13,20,0.75);
      border: 1px solid rgba(201,169,110,0.35);
      color: var(--cream);
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
    }

    #popup-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0,0,0,0.2);
      z-index: 7;
    }

    .popup {
      max-width: 320px;
      background: rgba(13,13,20,0.92);
      border: 1px solid rgba(201,169,110,0.4);
      border-radius: 16px;
      padding: 1.5rem;
      color: var(--cream);
      backdrop-filter: blur(16px);
      position: relative;
    }

    .popup h3 {
      font-family: "Playfair Display", serif;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .popup ul { list-style: none; display: grid; gap: 6px; }
    .popup li::before { content: "?"; color: var(--green); margin-right: 6px; }
    .popup button {
      position: absolute;
      right: 12px;
      top: 12px;
      background: transparent;
      border: none;
      color: var(--cream);
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .info-panel { display: none; }
      .controls-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="wrap">
      <div style="font-size:2.5rem;">COUR IMMO</div>
      <div style="font-size:0.95rem; color:rgba(201,169,110,0.8);">Chargement de la maquette 3D...</div>
      <div class="bar"><span></span></div>
    </div>
  </div>

  <header>
    <div class="brand">
      <a class="back-link" href="/">Retour au Business Plan</a>
      <img class="logo" src="/logo.png" alt="Logo Cour Immo" />
      <div class="title">COUR IMMO</div>
      <div class="subtitle">Adidogomé, Lomé — Maquette 3D Interactive</div>
    </div>
    <div class="toggle">
      <button id="dayBtn">Jour</button>
      <button id="nightBtn">?? Nuit</button>
    </div>
  </header>

  <div id="canvas-container"></div>

  <div class="info-panel">
    <div class="info-card"><div class="value">10 studios</div><div class="label">5 par rangée</div></div>
    <div class="info-card"><div class="value">2520K FCFA</div><div class="label">loyer mensuel</div></div>
    <div class="info-card"><div class="value">Disponible</div><div class="label">à partir avril 2025</div></div>
  </div>

  <div class="controls-bar">
    <button class="active" data-view="threequarter">Vue 3/4</button>
    <button data-view="aerial">Vue aérienne</button>
    <button data-view="facade">Vue façade</button>
    <button data-view="tour">Visite guidée</button>
  </div>

  <div id="tour-hud">
    <div class="location" id="tourLocation">Entrée principale</div>
    <div class="progress"><span id="tourProgress"></span></div>
    <div class="actions">
      <button id="tourPause">Pause</button>
      <button id="tourQuit">Quitter</button>
    </div>
  </div>

  <div id="popup-overlay">
    <div class="popup" id="popup">
      <button id="popupClose">?</button>
      <h3 id="popupTitle">Studio</h3>
      <p id="popupSubtitle" style="margin-bottom:10px; color:rgba(245,240,232,0.75);"></p>
      <ul id="popupList"></ul>
    </div>
  </div>

  <script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    container.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
    const target = new THREE.Vector3(0, 1, 0);

    let theta = 0.78, phi = 0.58, radius = 22;
    let targetTheta = theta, targetPhi = phi, targetRadius = radius;
    let isDragging = false;

    const materials = {
      wall: new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.85 }),
      wallAlt: new THREE.MeshStandardMaterial({ color: 0xe8e4d8, roughness: 0.7 }),
      roof: new THREE.MeshStandardMaterial({ color: 0x2d2d30, roughness: 0.92, side: THREE.DoubleSide }),
      windowFrame: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4 }),
      glass: new THREE.MeshStandardMaterial({ color: 0x7aaccc, transparent: true, opacity: 0.35, metalness: 0.15 }),
      doorFrame: new THREE.MeshStandardMaterial({ color: 0x1a1a1a }),
      door: new THREE.MeshStandardMaterial({ color: 0x8b5e3c, roughness: 0.55 }),
      lamp: new THREE.MeshStandardMaterial({ color: 0xe8d89a, emissive: 0xffcc44, emissiveIntensity: 0 }),
      lampBracket: new THREE.MeshStandardMaterial({ color: 0x888880 }),
      porch: new THREE.MeshStandardMaterial({ color: 0xd8d0c0, roughness: 0.9 }),
      pot: new THREE.MeshStandardMaterial({ color: 0xc27a4a }),
      foliageA: new THREE.MeshStandardMaterial({ color: 0x3a7030 }),
      foliageB: new THREE.MeshStandardMaterial({ color: 0x5a9040 }),
      ac: new THREE.MeshStandardMaterial({ color: 0x888888 }),
      paving: new THREE.MeshStandardMaterial({ color: 0xc8bfb0, roughness: 0.92 }),
      pavingLine: new THREE.MeshStandardMaterial({ color: 0xb0a898, roughness: 1.0 }),
      lawn: new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 1.0 }),
      boundary: new THREE.MeshStandardMaterial({ color: 0xe8e4d8, roughness: 0.85 }),
      treeTrunk: new THREE.MeshStandardMaterial({ color: 0x5c3d2e }),
      treeLeafA: new THREE.MeshStandardMaterial({ color: 0x2d6b28 }),
      treeLeafB: new THREE.MeshStandardMaterial({ color: 0x3a7a32 }),
      treeLeafC: new THREE.MeshStandardMaterial({ color: 0x234f1e })
    };

    function createHippedRoof(width, depth, height, ridge) {
      const over = 0.35;
      const w = width / 2 + over;
      const d = depth / 2 + over;
      const ridgeHalf = ridge / 2;
      const yBase = height;
      const yRidge = height + 1.6;

      const vertices = new Float32Array([
        -w, yBase, -d,
         w, yBase, -d,
         w, yBase,  d,
        -w, yBase,  d,
        -ridgeHalf, yRidge, 0,
         ridgeHalf, yRidge, 0,
        0, yBase, -d,
        0, yBase,  d
      ]);

      const indices = [
        0,1,4, 1,2,5,
        2,3,5, 3,0,4,
        0,4,6, 1,6,4,
        1,5,6, 2,7,5,
        2,5,7, 3,4,7,
        3,7,4, 0,6,4
      ];

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return geo;
    }

    function buildUnit(x, z, facingLeft, isCorner = false) {
      const group = new THREE.Group();
      const width = isCorner ? 7.5 : 5;
      const height = isCorner ? 3.0 : 2.8;
      const depth = 7;

      const wall = new THREE.Mesh(new THREE.BoxGeometry(width - 0.2, height, depth - 0.2), materials.wall);
      wall.position.y = height / 2;
      wall.castShadow = true;
      wall.receiveShadow = true;
      group.add(wall);

      const porchRecess = new THREE.Mesh(new THREE.BoxGeometry(isCorner ? 3.0 : 2.0, height, 1.0), materials.wall);
      porchRecess.position.set(0, height / 2, depth / 2 - 0.5);
      group.add(porchRecess);

      const columns = isCorner ? 3 : 2;
      for (let i = 0; i < columns; i++) {
        const col = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, height, 12), materials.wallAlt);
        col.position.set((i - (columns - 1) / 2) * 0.9, height / 2, depth / 2 + 0.1);
        col.castShadow = true;
        group.add(col);
      }

      const roofGeo = createHippedRoof(width, depth, height, isCorner ? 3.0 : 2.4);
      const roof = new THREE.Mesh(roofGeo, materials.roof);
      roof.castShadow = true;
      roof.receiveShadow = true;
      group.add(roof);

      const windowCount = isCorner ? 2 : 1;
      for (let i = 0; i < windowCount; i++) {
        const frame = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.4, 0.08), materials.windowFrame);
        frame.position.set((i - (windowCount - 1) / 2) * 2.4, 1.5, depth / 2 + 0.02);
        group.add(frame);

        for (let p = 0; p < 3; p++) {
          const pane = new THREE.Mesh(new THREE.BoxGeometry(0.65, 1.2, 0.04), materials.glass);
          pane.position.set(frame.position.x - 0.65 + p * 0.65, 1.5, depth / 2 + 0.06);
          group.add(pane);
        }
      }

      const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(1.0, 2.2, 0.1), materials.doorFrame);
      doorFrame.position.set(0, 1.1, depth / 2 - 0.4);
      group.add(doorFrame);

      const door = new THREE.Mesh(new THREE.BoxGeometry(0.85, 2.0, 0.08), materials.door);
      door.position.set(0, 1.0, depth / 2 - 0.35);
      group.add(door);

      const lampBracket = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.15), materials.lampBracket);
      lampBracket.position.set(0.8, 2.0, depth / 2 - 0.35);
      group.add(lampBracket);

      const lampShade = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.16, 12), materials.lamp);
      lampShade.position.set(0.8, 2.0, depth / 2 - 0.2);
      group.add(lampShade);

      const porchFloor = new THREE.Mesh(new THREE.BoxGeometry(isCorner ? 3.0 : 2.0, 0.05, 1.2), materials.porch);
      porchFloor.position.set(0, 0.03, depth / 2 + 0.2);
      group.add(porchFloor);

      const porchStep = new THREE.Mesh(new THREE.BoxGeometry(isCorner ? 3.0 : 2.0, 0.12, 0.3), materials.porch);
      porchStep.position.set(0, 0.06, depth / 2 + 0.8);
      group.add(porchStep);

      const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 0.28, 12), materials.pot);
      pot.position.set(-0.6, 0.14, depth / 2 + 0.2);
      group.add(pot);

      const foliage = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 12), Math.random() > 0.5 ? materials.foliageA : materials.foliageB);
      foliage.position.set(-0.6, 0.5, depth / 2 + 0.2);
      group.add(foliage);

      const ac = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.5), materials.ac);
      ac.position.set(0.6, height + 0.4, -0.6);
      ac.castShadow = true;
      group.add(ac);

      const fan = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.04, 16), new THREE.MeshStandardMaterial({ color: 0x666666 }));
      fan.rotation.x = Math.PI / 2;
      fan.position.set(0.6, height + 0.56, -0.6);
      group.add(fan);

      group.position.set(x, 0, z);
      group.rotation.y = facingLeft ? Math.PI : 0;
      scene.add(group);
      return { group, lampShade, doorPos: new THREE.Vector3(x, 0.9, z + (facingLeft ? -3.4 : 3.4)) };
    }
    function buildCornerUnit(x, z) {
      return buildUnit(x, z, false, true);
    }

    function buildCourtyard() {
      const court = new THREE.Mesh(new THREE.BoxGeometry(8, 0.05, 16), materials.paving);
      court.position.y = 0.02;
      court.receiveShadow = true;
      scene.add(court);

      for (let i = 0; i < 10; i++) {
        const line = new THREE.Mesh(new THREE.BoxGeometry(8, 0.001, 0.04), materials.pavingLine);
        line.position.set(0, 0.03, -7.2 + i * 1.6);
        scene.add(line);
      }
      for (let i = 0; i < 5; i++) {
        const line = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.001, 16), materials.pavingLine);
        line.position.set(-3.2 + i * 1.6, 0.03, 0);
        scene.add(line);
      }

      const entry = new THREE.Mesh(new THREE.BoxGeometry(5, 0.05, 3), materials.paving);
      entry.position.set(0, 0.02, 9.5);
      scene.add(entry);

      const step1 = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 0.3), new THREE.MeshStandardMaterial({ color: 0xc0b8a8 }));
      step1.position.set(0, 0.05, 8.7);
      scene.add(step1);
      const step2 = step1.clone();
      step2.position.set(0, 0.15, 8.4);
      scene.add(step2);
    }

    function buildLandscape() {
      const lawn = new THREE.Mesh(new THREE.BoxGeometry(36, 0.02, 26), materials.lawn);
      lawn.position.y = -0.01;
      lawn.receiveShadow = true;
      scene.add(lawn);

      const wall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.9, 20), materials.boundary);
      wall.position.set(16, 0.45, 0);
      scene.add(wall);

      const gateL = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.4, 12), materials.lampBracket);
      gateL.position.set(-2.8, 0.7, 10.8);
      scene.add(gateL);
      const gateR = gateL.clone();
      gateR.position.set(2.8, 0.7, 10.8);
      scene.add(gateR);

      function addTree(x, z) {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 4, 10), materials.treeTrunk);
        trunk.position.set(x, 2, z);
        trunk.castShadow = true;
        scene.add(trunk);
        const c1 = new THREE.Mesh(new THREE.SphereGeometry(2.2, 12, 12), materials.treeLeafA);
        c1.position.set(x, 5, z);
        const c2 = new THREE.Mesh(new THREE.SphereGeometry(2.0, 12, 12), materials.treeLeafB);
        c2.position.set(x + 1.2, 5.5, z + 0.8);
        const c3 = new THREE.Mesh(new THREE.SphereGeometry(1.8, 12, 12), materials.treeLeafC);
        c3.position.set(x - 1.1, 5.2, z - 0.6);
        [c1, c2, c3].forEach(c => { c.castShadow = true; scene.add(c); });
      }

      addTree(15, 11);
      addTree(-15, 11);
      addTree(15, -11);
      addTree(-15, -11);
      addTree(7, -11);
      addTree(-7, -11);

      for (let i = -6; i <= 6; i += 2) {
        const shrub = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 10), new THREE.MeshStandardMaterial({ color: 0x4a8035 }));
        shrub.position.set(-4.8, 0.4, i);
        scene.add(shrub);
        const shrub2 = shrub.clone();
        shrub2.position.set(4.8, 0.4, i);
        scene.add(shrub2);
      }

      const banana = new THREE.Group();
      for (let i = 0; i < 5; i++) {
        const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.6, 1.4), new THREE.MeshStandardMaterial({ color: 0x5a9030 }));
        leaf.position.set(0, 0.8 + i * 0.1, 0);
        leaf.rotation.x = Math.PI / 2.4;
        leaf.rotation.y = (i - 2) * 0.4;
        banana.add(leaf);
      }
      banana.position.set(-8, 0, -6);
      scene.add(banana);
    }

    const lampLights = [];
    const hotspots = [];

    function buildUnits() {
      const unitSpacing = 4.8;
      const leftRowX = -6;
      const rightRowX = 6;

      for (let i = 0; i < 4; i++) {
        const z = -6 + i * unitSpacing;
        const unit = buildUnit(leftRowX, z, false, i === 0);
        const unitR = buildUnit(rightRowX, z, true, false);
        lampLights.push(unit.lampShade, unitR.lampShade);

        const hotspot = createHotspot(unit.group.position.x, 1.4, unit.group.position.z + 3.4, 'Studio Standard', '25 000 FCFA', ['25m²', 'lit superposé', 'frigo', 'ventilateur', 'douche']);
        hotspots.push(hotspot);
        const hotspotR = createHotspot(unitR.group.position.x, 1.4, unitR.group.position.z - 3.4, 'Studio Standard', '25 000 FCFA', ['25m²', 'lit superposé', 'frigo', 'ventilateur', 'douche']);
        hotspots.push(hotspotR);
      }

      const cornerHotspot = createHotspot(leftRowX, 1.6, -6 + 0 * unitSpacing + 3.6, 'Studio Palette', '20 000 FCFA', ['20m²', 'lit palette', 'ventilateur', 'cuisine', 'douche'], 0.22);
      hotspots.push(cornerHotspot);
    }

    function createHotspot(x, y, z, title, subtitle, features, size = 0.15) {
      const group = new THREE.Group();
      const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 16, 16), new THREE.MeshStandardMaterial({ color: 0xe8a030 }));
      const ring = new THREE.Mesh(new THREE.RingGeometry(size * 1.4, size * 1.8, 24), new THREE.MeshBasicMaterial({ color: 0xe8a030, transparent: true, opacity: 0.6 }));
      ring.rotation.x = -Math.PI / 2;
      group.add(sphere);
      group.add(ring);
      group.position.set(x, y, z);
      group.userData = { title, subtitle, features };
      scene.add(group);
      return { group, sphere, ring };
    }

    function buildCourtyardHotspot() {
      const hotspot = createHotspot(0, 1.0, 0, 'Cour commune', 'Label Cour Propre', ['nettoyage', 'internet', 'eau', 'éclairage', 'maintenance'], 0.18);
      hotspot.sphere.material.color.set(0x5aa6d8);
      hotspots.push(hotspot);
    }

    function setupLighting() {
      const dirLight = new THREE.DirectionalLight(0xfff8e8, 1.8);
      dirLight.position.set(20, 28, 15);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(4096, 4096);
      dirLight.shadow.camera.left = -25;
      dirLight.shadow.camera.right = 25;
      dirLight.shadow.camera.top = 20;
      dirLight.shadow.camera.bottom = -20;
      dirLight.shadow.bias = -0.0005;
      scene.add(dirLight);

      const ambient = new THREE.AmbientLight(0xc8dff0, 0.5);
      scene.add(ambient);
      const hemi = new THREE.HemisphereLight(0x87ceeb, 0x4a8c3f, 0.3);
      scene.add(hemi);

      scene.background = new THREE.Color(0x87c5e0);
      scene.fog = new THREE.FogExp2(0xa0c8d8, 0.012);

      return { dirLight, ambient, hemi };
    }

    const lights = setupLighting();

    function setMode(mode) {
      if (mode === 'night') {
        lights.dirLight.intensity = 0.03;
        lights.ambient.color.set(0x0a0f1f);
        lights.ambient.intensity = 0.15;
        lights.hemi.intensity = 0.05;
        scene.background = new THREE.Color(0x040812);
        scene.fog = new THREE.FogExp2(0x040812, 0.02);
        renderer.toneMappingExposure = 0.6;
        materials.lamp.emissiveIntensity = 1.2;
        lampLights.forEach((lamp) => {
          const point = new THREE.PointLight(0xffcc44, 1.4, 4, 2);
          point.position.copy(lamp.getWorldPosition(new THREE.Vector3()));
          scene.add(point);
        });
        const moon = new THREE.PointLight(0xffeeaa, 0.4, 12, 2);
        moon.position.set(0, 6, 0);
        scene.add(moon);
      } else {
        lights.dirLight.intensity = 1.8;
        lights.ambient.color.set(0xc8dff0);
        lights.ambient.intensity = 0.5;
        lights.hemi.intensity = 0.3;
        scene.background = new THREE.Color(0x87c5e0);
        scene.fog = new THREE.FogExp2(0xa0c8d8, 0.012);
        renderer.toneMappingExposure = 1.15;
        materials.lamp.emissiveIntensity = 0;
      }
    }

    buildCourtyard();
    buildLandscape();
    buildUnits();
    buildCourtyardHotspot();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const popupOverlay = document.getElementById('popup-overlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupSubtitle = document.getElementById('popupSubtitle');
    const popupList = document.getElementById('popupList');

    function showPopup(data) {
      popupTitle.textContent = data.title;
      popupSubtitle.textContent = data.subtitle;
      popupList.innerHTML = data.features.map(f => `<li>${f}</li>`).join('');
      popupOverlay.style.display = 'grid';
    }

    function hidePopup() { popupOverlay.style.display = 'none'; }

    document.getElementById('popupClose').addEventListener('click', hidePopup);
    popupOverlay.addEventListener('click', (e) => { if (e.target.id === 'popup-overlay') hidePopup(); });

    renderer.domElement.addEventListener('click', (event) => {
      if (tourActive) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const objs = hotspots.map(h => h.sphere);
      const hit = raycaster.intersectObjects(objs);
      if (hit.length) {
        const idx = objs.indexOf(hit[0].object);
        if (idx > -1) showPopup(hotspots[idx].group.userData);
      }
    });

    const tourHud = document.getElementById('tour-hud');
    const tourLocation = document.getElementById('tourLocation');
    const tourProgress = document.getElementById('tourProgress');
    const tourPause = document.getElementById('tourPause');
    const tourQuit = document.getElementById('tourQuit');

    const tourKeyframes = [
      { pos: [0, 1.7, 10], look: [0, 1.5, 0], dur: 3000, label: 'Entrée principale' },
      { pos: [0, 1.7, 5], look: [0, 1.8, 0], dur: 2500, label: 'Allée centrale' },
      { pos: [-4, 1.7, 0], look: [-6, 1.8, 0], dur: 2500, label: 'Studios côté gauche' },
      { pos: [0, 1.7, 0], look: [4, 1.8, 0], dur: 2000, label: 'Studios côté droit' },
      { pos: [0, 1.7, -5], look: [0, 1.5, -8], dur: 2500, label: 'Fond de la cour' },
      { pos: [0, 4, 8], look: [0, 1, 0], dur: 2000, label: 'Vue d\'ensemble' }
    ];

    let tourActive = false;
    let tourPaused = false;
    let tourIndex = 0;
    let tourStart = 0;

    function startTour() {
      tourActive = true;
      tourPaused = false;
      tourIndex = 0;
      tourStart = performance.now();
      tourHud.style.display = 'grid';
      hidePopup();
    }

    function stopTour() {
      tourActive = false;
      tourHud.style.display = 'none';
    }

    tourPause.addEventListener('click', () => {
      tourPaused = !tourPaused;
      tourPause.textContent = tourPaused ? 'Reprendre' : 'Pause';
    });

    tourQuit.addEventListener('click', () => stopTour());

    function updateTour(time) {
      if (!tourActive || tourPaused) return;
      const frame = tourKeyframes[tourIndex];
      const t = Math.min((time - tourStart) / frame.dur, 1);
      const next = tourKeyframes[tourIndex + 1] || frame;
      const pos = new THREE.Vector3().fromArray(frame.pos).lerp(new THREE.Vector3().fromArray(next.pos), t);
      const look = new THREE.Vector3().fromArray(frame.look).lerp(new THREE.Vector3().fromArray(next.look), t);
      camera.position.copy(pos);
      camera.lookAt(look);
      tourLocation.textContent = frame.label;
      tourProgress.style.width = `${((tourIndex + t) / (tourKeyframes.length)) * 100}%`;
      if (t >= 1 && tourIndex < tourKeyframes.length - 1) {
        tourIndex++;
        tourStart = time;
      }
    }

    function setView(view) {
      document.querySelectorAll('.controls-bar button').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
      if (view === 'tour') return startTour();
      stopTour();
      if (view === 'aerial') { targetPhi = 0.08; targetRadius = 26; }
      if (view === 'threequarter') { targetPhi = 0.58; targetRadius = 22; targetTheta = 0.78; }
      if (view === 'facade') { targetPhi = 1.25; targetRadius = 16; targetTheta = 0; }
    }

    document.querySelectorAll('.controls-bar button').forEach(btn => {
      btn.addEventListener('click', () => setView(btn.dataset.view));
    });

    document.getElementById('dayBtn').addEventListener('click', () => setMode('day'));
    document.getElementById('nightBtn').addEventListener('click', () => setMode('night'));

    renderer.domElement.addEventListener('mousedown', () => { isDragging = true; });
    renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
    renderer.domElement.addEventListener('mousemove', (e) => {
      if (!isDragging || tourActive) return;
      targetTheta -= e.movementX * 0.004;
      targetPhi -= e.movementY * 0.004;
      targetPhi = Math.max(0.08, Math.min(Math.PI * 0.46, targetPhi));
    });

    renderer.domElement.addEventListener('wheel', (e) => {
      targetRadius += e.deltaY * 0.01;
      targetRadius = Math.max(6, Math.min(35, targetRadius));
    });

    let touchStart = null;
    renderer.domElement.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });
    renderer.domElement.addEventListener('touchmove', (e) => {
      if (!touchStart || tourActive) return;
      const dx = e.touches[0].clientX - touchStart.x;
      const dy = e.touches[0].clientY - touchStart.y;
      targetTheta -= dx * 0.004;
      targetPhi -= dy * 0.004;
      targetPhi = Math.max(0.08, Math.min(Math.PI * 0.46, targetPhi));
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { hidePopup(); stopTour(); }
    });

    function animate(time) {
      requestAnimationFrame(animate);
      if (!tourActive) {
        targetTheta += isDragging ? 0 : 0.0006;
        theta += (targetTheta - theta) * 0.08;
        phi += (targetPhi - phi) * 0.08;
        radius += (targetRadius - radius) * 0.08;
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const z = radius * Math.sin(phi) * Math.sin(theta);
        const y = radius * Math.cos(phi);
        camera.position.set(x, y, z);
        camera.lookAt(target);
      }

      updateTour(time);

      const scale = 1 + Math.sin(time * 0.003) * 0.15;
      hotspots.forEach(h => {
        h.sphere.scale.setScalar(scale);
        h.ring.scale.setScalar(scale);
      });

      renderer.render(scene, camera);
    }

    animate(0);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 2000);
  </script>
</body>
</html>
